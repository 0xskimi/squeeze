<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squeeze</title>
  <meta name="description" content="Make your videos smaller, right in your browser. Nothing gets uploaded.">
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/src/style.css">
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" defer></script>
  <script>
    (function () {
      const stored = localStorage.getItem('squeeze-theme');
      const theme = stored === 'light' || stored === 'dark'
        ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body id="top">
  <nav class="navbar">
    <a href="#top" class="wordmark" aria-label="Squeeze home">
      <svg class="wordmark-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M13.75 3C14.1642 3 14.5 3.33579 14.5 3.75V8.43934L19.7197 3.21967C20.0126 2.92678 20.4874 2.92678 20.7803 3.21967C21.0732 3.51256 21.0732 3.98744 20.7803 4.28033L15.5607 9.5H20.25C20.6642 9.5 21 9.83579 21 10.25C21 10.6642 20.6642 11 20.25 11H13.75C13.3358 11 13 10.6642 13 10.25V3.75C13 3.33579 13.3358 3 13.75 3ZM3.75 14.5C3.33579 14.5 3 14.1642 3 13.75C3 13.3358 3.33579 13 3.75 13H10.25C10.6642 13 11 13.3358 11 13.75V20.25C11 20.6642 10.6642 21 10.25 21C9.83579 21 9.5 20.6642 9.5 20.25V15.5607L4.28033 20.7803C3.98744 21.0732 3.51256 21.0732 3.21967 20.7803C2.92678 20.4874 2.92678 20.0126 3.21967 19.7197L8.43934 14.5H3.75Z" fill="currentColor"/>
      </svg>
      <span class="wordmark-text">squeeze</span>
    </a>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
      <i data-lucide="moon" class="theme-icon theme-icon--moon"></i>
      <i data-lucide="sun" class="theme-icon theme-icon--sun"></i>
    </button>
  </nav>

  <main class="stage">
    <header class="intro">
      <h1 class="headline">Make your videos smaller.</h1>
      <p class="subhead">Drop in videos and get lighter ones back, ready to share online. Add up to 5 at a time. It all happens right here on your device.</p>
    </header>

    <section class="workspace" id="workspace">
      <label class="dropzone" id="dropzone" for="file-input">
        <input type="file" id="file-input" accept="video/*" multiple hidden>
        <div class="dropzone-inner" id="dropzone-inner">
          <span class="dropzone-icon" aria-hidden="true">
            <i data-lucide="clapperboard"></i>
          </span>
          <p class="dropzone-title">Drop videos here</p>
          <p class="dropzone-sub">or click to pick</p>
          <p class="dropzone-note" id="dropzone-note">Up to 32MB each</p>
        </div>
      </label>

      <div class="job-list" id="job-list" hidden></div>

      <div class="tip-stand" id="tip-stand">
        <div class="tip-wrap">
          <button type="button" class="tip-trigger" id="tip-trigger" aria-expanded="false" aria-controls="tip-popover">
            <i data-lucide="circle-dollar-sign"></i>
            <span>Tip USDC</span>
          </button>
          <div class="tip-popover" id="tip-popover" hidden>
            <canvas id="tip-qr" class="tip-qr" aria-hidden="true"></canvas>
            <p class="tip-label">USDC on Solana</p>
            <p class="tip-address" id="tip-address"></p>
            <button type="button" class="tip-copy" id="tip-copy">Copy address</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span class="footer-year">&copy; 2026 Squeeze</span>
    <a href="https://tentacore.xyz" class="footer-link">A Tentacore project</a>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
