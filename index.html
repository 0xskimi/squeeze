<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squeeze</title>
  <meta name="description" content="Make your videos smaller, right in your browser. Nothing gets uploaded.">
  <link rel="stylesheet" href="/src/style.css">
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" defer></script>
  <script>
    (function () {
      const stored = localStorage.getItem('squeeze-theme');
      const theme = stored === 'light' || stored === 'dark'
        ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body id="top">
  <nav class="navbar">
    <a href="#top" class="wordmark" aria-label="Squeeze home">
      <span class="wordmark-mark" aria-hidden="true">
        <span class="chev chev-left">›</span><span class="chev chev-right">‹</span>
      </span>
      <span class="wordmark-text">squeeze</span>
    </a>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
      <i data-lucide="moon" class="theme-icon theme-icon--moon"></i>
      <i data-lucide="sun" class="theme-icon theme-icon--sun"></i>
    </button>
  </nav>

  <main class="stage">
    <header class="intro">
      <h1 class="headline">Make your videos smaller.</h1>
      <p class="subhead">Drop in a video and get a lighter one back, ready to share online. It all happens right here on your device.</p>
    </header>

    <section class="workspace" id="workspace">
      <label class="dropzone" id="dropzone" for="file-input">
        <input type="file" id="file-input" accept="video/*" hidden>
        <div class="dropzone-inner" id="dropzone-inner">
          <span class="dropzone-icon" aria-hidden="true">
            <i data-lucide="clapperboard"></i>
          </span>
          <p class="dropzone-title">Drop a video here</p>
          <p class="dropzone-sub">or click to pick one</p>
          <p class="dropzone-note">Up to 32MB</p>
        </div>
      </label>

      <div class="status" id="status" hidden>
        <div class="status-row">
          <span class="status-label" id="status-label">Getting ready</span>
          <span class="status-value" id="status-value"></span>
        </div>
        <div class="progress-track" id="progress-track" hidden>
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div class="result" id="result" hidden>
        <div class="result-headline">
          <span class="result-saved" id="saved-percent">—</span>
          <span class="result-saved-label">smaller</span>
        </div>
        <div class="result-sizes">
          <span id="original-size">—</span>
          <i data-lucide="arrow-right" class="result-arrow" aria-hidden="true"></i>
          <span class="result-after" id="output-size">—</span>
        </div>
        <div class="result-actions">
          <a class="btn btn-primary" id="download-link" download>Download video</a>
          <button type="button" class="btn btn-ghost" id="reset-btn">Squeeze another</button>
        </div>
      </div>

      <p class="privacy-note">Your video stays on your device. It is never sent anywhere.</p>
    </section>
  </main>

  <footer class="footer">
    <span class="footer-year">&copy; 2026 Squeeze</span>
    <a href="https://tentacore.xyz" class="footer-link">A Tentacore project</a>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
